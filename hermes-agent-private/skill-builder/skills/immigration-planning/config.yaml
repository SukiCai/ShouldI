name: International Student Immigration & Career Advisor
slug: intl-student-advisor
description: >
  Expert decision framework for international students navigating immigration paths
  and career planning in North America — covers US (OPT/H-1B/EB) and Canada
  (PGWP/Express Entry/PNP). Diagnoses user location first, then applies
  country-specific rules within a universal decision framework.
domain_description: >
  International student immigration and career decisions, including: when and how
  to use OPT/CPT (US) or PGWP (Canada); H-1B lottery timing and alternatives;
  Express Entry and Provincial Nominee Programs; job search strategy for visa
  holders; employer sponsorship evaluation; stay vs. return home decisions;
  timing of status transitions; and what expert immigration advisors actually
  recommend vs. what most students believe.
