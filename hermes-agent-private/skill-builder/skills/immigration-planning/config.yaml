name: International Student Immigration & Career Advisor
slug: intl-student-advisor
description: >
  Expert decision framework for international students navigating immigration paths
  and career planning in North America — covers US (OPT/H-1B/EB) and Canada
  (PGWP/Express Entry/PNP). Diagnoses user location first, then applies
  country-specific rules within a universal decision framework.
domain_description: >
  International student immigration and career decisions, including: when and how
  to use OPT/CPT (US) or PGWP (Canada); H-1B lottery timing and alternatives;
  Express Entry and Provincial Nominee Programs; job search strategy for visa
  holders; employer sponsorship evaluation; stay vs. return home decisions;
  timing of status transitions; and what expert immigration advisors actually
  recommend vs. what most students believe.
countries:
  - us
  - canada
country_labels:
  us: "United States"
  canada: "Canada"
tags:
  - immigration
  - international-students
  - visa
  - career
  - us
  - canada
  - opt
  - h1b
  - express-entry
  - pgwp

# Source type weights — override defaults for this skill if needed.
# Defaults: official=1.5, authoritative=1.2, expert=1.0, community=0.8
source_weights:
  official: 1.5
  authoritative: 1.2
  expert: 1.0
  community: 0.8

# Map legacy raw/ subdirectory names to source types (for backward compatibility).
# Files under raw/books/ and raw/canada/ etc. had no type before — treat them as expert.
source_type_map:
  books: authoritative
  canada: expert
  us: expert
  framework: authoritative

# Default regions when a source has no explicit region signal.
# All scraped community data and official docs will be tagged more precisely.
default_regions: ["us", "canada"]

# Map source path keywords → regions (checked against full file path).
# More specific patterns take priority (checked in order, first match wins).
source_regions_map:
  nscc_pgwp: ["canada"]
  cuny: ["us"]
  canadian_experience_class: ["canada"]
  express_entry_crs: ["canada"]
  pgwp_2024: ["canada"]
  pgwp_express: ["canada"]
  pnp_tech: ["canada"]
  eb2_green_card: ["us"]
  opt_h1b: ["us"]
  opt_stem: ["us"]
  h1b_lottery: ["us"]
  framework: ["us", "canada"]
