services:
  hermes:
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile
    ports:
      - "${SHOULDI_HERMES_HOST_PORT:-8642}:8642"
    environment:
      HERMES_HOME: /opt/data
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${HERMES_API_KEY:-change-me-local-dev}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Match bind-mounted ~/.hermes ownership on macOS/Linux hosts
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
    volumes:
      # Bind mount host ~/.hermes by setting SHOULDI_HERMES_DATA in .env
      - ${SHOULDI_HERMES_DATA:-hermes-data}:/opt/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8642/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${SHOULDI_API_HOST_PORT:-8787}:8787"
    environment:
      PORT: "8787"
      HERMES_API_URL: http://hermes:8642
      HERMES_API_KEY: ${HERMES_API_KEY:-change-me-local-dev}
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8787)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:${SHOULDI_API_HOST_PORT:-8787}
    ports:
      - "${SHOULDI_WEB_HOST_PORT:-18080}:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  hermes-data:
